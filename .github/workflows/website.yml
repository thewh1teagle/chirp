name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - "chirp-website/**"
      - "scripts/website_links.py"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          package_json_file: chirp-website/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chirp-website/pnpm-lock.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: |
          pnpm install
          pnpm update:downloads
          pnpm build
        working-directory: chirp-website
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chirp-website/dist

  deploy:
    needs: build
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
