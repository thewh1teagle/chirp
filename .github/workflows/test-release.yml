name: test release

on:
  workflow_dispatch:
    inputs:
      runner_tag:
        description: "Runner release tag to test"
        required: true
        default: "chirp-runner-v0.2.12"
        type: string
      kokoro_bundle_url:
        description: "Kokoro model bundle URL"
        required: true
        default: "https://huggingface.co/thewh1teagle/chirp-kokoro-models/resolve/main/chirp-kokoro-models-kokoro-v1.0.tar.gz"
        type: string

permissions:
  contents: read

jobs:
  kokoro-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x64
            archive: chirp-runner-linux-x64.tar.gz
            binary: chirp
            shell: bash
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
            archive: chirp-runner-linux-arm64.tar.gz
            binary: chirp
            shell: bash
          - runner: macos-14
            platform: darwin-arm64
            archive: chirp-runner-darwin-arm64.tar.gz
            binary: chirp
            shell: bash
          - runner: windows-latest
            platform: windows-x64
            archive: chirp-runner-windows-x64.zip
            binary: chirp.exe
            shell: pwsh
    runs-on: ${{ matrix.runner }}
    env:
      RUNNER_TAG: ${{ github.event.inputs.runner_tag }}
      KOKORO_BUNDLE_URL: ${{ github.event.inputs.kokoro_bundle_url }}
      ARCHIVE: ${{ matrix.archive }}
      BINARY: ${{ matrix.binary }}

    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libvulkan1 curl

      - name: Download runner and Kokoro bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          mkdir -p dist models
          gh release download "${RUNNER_TAG}" --pattern "${ARCHIVE}" --dir dist
          curl -L --retry 3 --retry-delay 5 -o dist/kokoro.tar.gz "${KOKORO_BUNDLE_URL}"
          tar -xzf "dist/${ARCHIVE}" -C dist
          tar -xzf dist/kokoro.tar.gz -C models
          chmod +x "dist/chirp-runner-${{ matrix.platform }}/${BINARY}"
          if [ -f "dist/chirp-runner-${{ matrix.platform }}/chirp-kokoro-worker" ]; then
            chmod +x "dist/chirp-runner-${{ matrix.platform }}/chirp-kokoro-worker"
          fi
          find dist -maxdepth 2 -type f -print
          find models -maxdepth 3 -type f -print

      - name: Download runner and Kokoro bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path models | Out-Null
          gh release download "$env:RUNNER_TAG" --pattern "$env:ARCHIVE" --dir dist
          curl.exe -L --retry 3 --retry-delay 5 -o dist\kokoro.tar.gz "$env:KOKORO_BUNDLE_URL"
          Expand-Archive -Path "dist\$env:ARCHIVE" -DestinationPath dist -Force
          tar -xzf dist\kokoro.tar.gz -C models
          Get-ChildItem -Recurse dist | Select-Object FullName
          Get-ChildItem -Recurse models | Select-Object FullName

      - name: Kokoro HTTP smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          RUNNER="dist/chirp-runner-${{ matrix.platform }}/${BINARY}"
          MODEL_DIR="models/chirp-kokoro-models-kokoro-v1.0"
          "${RUNNER}" --version
          "${RUNNER}" serve --host 127.0.0.1 --port 51972 > runner.log 2>&1 &
          RUNNER_PID=$!
          trap 'kill ${RUNNER_PID} || true' EXIT
          for _ in $(seq 1 60); do
            curl -fsS http://127.0.0.1:51972/health && break
            sleep 1
          done
          curl -fsS -X POST http://127.0.0.1:51972/v1/models/load \
            -H 'Content-Type: application/json' \
            -d "{\"runtime\":\"kokoro\",\"kokoro\":{\"model_path\":\"${MODEL_DIR}/kokoro-v1.0.onnx\",\"voices_path\":\"${MODEL_DIR}/voices-v1.0.bin\",\"espeak_data_path\":\"${MODEL_DIR}/espeak-ng-data\",\"voice\":\"af_heart\",\"language\":\"en-us\"}}"
          curl -fsS -X POST http://127.0.0.1:51972/v1/audio/speech \
            -H 'Content-Type: application/json' \
            -o out.wav \
            -d '{"input":"Hello world from Chirp Kokoro.","voice":"af_heart","language":"en-us","response_format":"wav"}'
          test -s out.wav

      - name: Kokoro HTTP smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $runner = "dist\chirp-runner-${{ matrix.platform }}\$env:BINARY"
          $modelDir = "models\chirp-kokoro-models-kokoro-v1.0"
          & $runner --version
          $proc = Start-Process -FilePath $runner -ArgumentList @("serve", "--host", "127.0.0.1", "--port", "51972") -RedirectStandardOutput runner.log -RedirectStandardError runner.err -PassThru
          try {
            for ($i = 0; $i -lt 60; $i++) {
              try {
                curl.exe -fsS http://127.0.0.1:51972/health
                break
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            $load = @{
              runtime = "kokoro"
              kokoro = @{
                model_path = "$modelDir\kokoro-v1.0.onnx"
                voices_path = "$modelDir\voices-v1.0.bin"
                espeak_data_path = "$modelDir\espeak-ng-data"
                voice = "af_heart"
                language = "en-us"
              }
            } | ConvertTo-Json -Depth 4 -Compress
            curl.exe -fsS -X POST http://127.0.0.1:51972/v1/models/load -H "Content-Type: application/json" -d $load
            curl.exe -fsS -X POST http://127.0.0.1:51972/v1/audio/speech -H "Content-Type: application/json" -o out.wav -d '{"input":"Hello world from Chirp Kokoro.","voice":"af_heart","language":"en-us","response_format":"wav"}'
            if (!(Test-Path out.wav) -or ((Get-Item out.wav).Length -eq 0)) { throw "out.wav was not created" }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Upload smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-smoke-${{ matrix.platform }}
          path: |
            out.wav
            runner.log
            runner.err
          if-no-files-found: ignore
