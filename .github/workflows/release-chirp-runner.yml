name: release chirp-runner

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (for example: chirp-runner-v0.1.0)"
        required: true
        type: string
      chirp_c_tag:
        description: "chirp-c release tag to link against"
        required: true
        default: "chirp-c-v0.3.1"
        type: string
  push:
    tags:
      - "chirp-runner-v*"

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
  CHIRP_C_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.chirp_c_tag || 'chirp-c-v0.3.1' }}

jobs:
  create-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: chirp-runner ${{ env.VERSION }}
          body: |
            chirp-runner built against chirp-c `${{ env.CHIRP_C_TAG }}`.
          generate_release_notes: true

  build-and-upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux-x64
            backend: vulkan
            goos: linux
            goarch: amd64
            binary: chirp
            archive_ext: tar.gz
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
            backend: vulkan
            goos: linux
            goarch: arm64
            binary: chirp
            archive_ext: tar.gz
          - runner: macos-14
            platform: darwin-arm64
            backend: metal
            goos: darwin
            goarch: arm64
            binary: chirp
            archive_ext: tar.gz
          - runner: windows-latest
            platform: windows-x64
            backend: vulkan
            goos: windows
            goarch: amd64
            binary: chirp.exe
            archive_ext: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: chirp-runner/go.mod

      - uses: astral-sh/setup-uv@v5

      - name: Install Vulkan deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libvulkan-dev

      - name: Install Vulkan deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-vulkan-devel mingw-w64-ucrt-x86_64-gcc

      - name: Add UCRT64 to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "$env:RUNNER_TEMP\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Download chirp-c libraries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          uv run python scripts/download-libs.py \
            --tag "${CHIRP_C_TAG}" \
            --platform "${{ matrix.platform }}" \
            --backend "${{ matrix.backend }}"

      - name: Build chirp runner
        shell: bash
        working-directory: chirp-runner
        run: |
          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          CGO_LDFLAGS_ALLOW='-Wl,.*' \
          go build \
            -x \
            -o "../dist/chirp-runner-${{ matrix.platform }}/${{ matrix.binary }}" \
            -ldflags "-X main.version=${VERSION} -X main.commit=${GITHUB_SHA::8}" \
            ./cmd/chirp

      - name: Build Kokoro worker
        shell: bash
        run: |
          cmake -S runtimes/kokoro -B "dist/kokoro-worker-build-${{ matrix.platform }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build "dist/kokoro-worker-build-${{ matrix.platform }}" \
            --target chirp-kokoro-worker \
            --config Release \
            -j

      - name: Package chirp runner
        shell: bash
        run: |
          WORKER="dist/kokoro-worker-build-${{ matrix.platform }}/chirp-kokoro-worker"
          if [ "${{ runner.os }}" = "Windows" ]; then
            WORKER="dist/kokoro-worker-build-${{ matrix.platform }}/Release/chirp-kokoro-worker.exe"
          fi
          uv run python scripts/package-runner.py \
            --binary "dist/chirp-runner-${{ matrix.platform }}/${{ matrix.binary }}" \
            --out "dist/chirp-runner-${{ matrix.platform }}.${{ matrix.archive_ext }}" \
            --platform "${{ matrix.platform }}" \
            --version "${VERSION}" \
            --chirp-c-tag "${CHIRP_C_TAG}" \
            --worker "$WORKER"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-runner-${{ matrix.platform }}
          path: dist/chirp-runner-${{ matrix.platform }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:VERSION" "dist/chirp-runner-${{ matrix.platform }}.${{ matrix.archive_ext }}" --clobber
