name: release chirp-c

on:
  workflow_dispatch:
  push:
    tags:
      - "chirp-c-v*"

permissions:
  contents: write

jobs:
  build:
    name: chirp-c ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            backend: vulkan
            archive_ext: tar.gz
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            backend: vulkan
            archive_ext: tar.gz
            rust_target: aarch64-unknown-linux-gnu
          - os: macos-14
            platform: darwin-arm64
            backend: metal
            archive_ext: tar.gz
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            platform: windows-x64
            backend: vulkan
            archive_ext: zip
            rust_target: x86_64-pc-windows-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: chirp-c-cargo-${{ matrix.platform }}-${{ hashFiles('runtimes/qwen/CMakeLists.txt') }}
          restore-keys: |
            chirp-c-cargo-${{ matrix.platform }}-

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: runtimes/qwen/build/_deps
          key: chirp-c-deps-${{ matrix.platform }}-${{ matrix.backend }}-${{ hashFiles('runtimes/qwen/CMakeLists.txt', 'scripts/build-libs.py', 'scripts/package-libs.py', 'runtimes/qwen/scripts/uv.lock') }}
          restore-keys: |
            chirp-c-deps-${{ matrix.platform }}-${{ matrix.backend }}-

      - name: Install Vulkan deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libvulkan-dev glslang-tools glslc libshaderc-dev

      - name: Install Vulkan deps (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-vulkan-devel mingw-w64-ucrt-x86_64-shaderc mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-tools

      - name: Add UCRT64 to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "$env:RUNNER_TEMP\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build chirp-c
        shell: bash
        run: |
          uv run python scripts/build-libs.py \
            --backend "${{ matrix.backend }}" \
            --preset-name "${{ matrix.platform }}-${{ matrix.backend }}"

      - name: Package chirp-c
        shell: bash
        run: |
          uv run python scripts/package-libs.py \
            --backend "${{ matrix.backend }}" \
            --platform "${{ matrix.platform }}" \
            --archive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-c-${{ matrix.platform }}-${{ matrix.backend }}
          path: dist/chirp-c-${{ matrix.platform }}-${{ matrix.backend }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/chirp-c-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chirp-c-${{ matrix.platform }}-${{ matrix.backend }}.${{ matrix.archive_ext }}
