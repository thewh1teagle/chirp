name: release chirp-c

on:
  workflow_dispatch:
  push:
    tags:
      - "chirp-c-v*"

permissions:
  contents: write

jobs:
  build:
    name: chirp-c ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            backend: vulkan
            archive_ext: tar.gz
          - os: macos-14
            platform: darwin-arm64
            backend: metal
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            backend: vulkan
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Vulkan deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libvulkan-dev glslang-tools glslc libshaderc-dev

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "Vulkan SDK was not installed under C:\VulkanSDK" }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$($sdk.FullName)\Lib" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build chirp-c
        shell: bash
        run: |
          uv run python scripts/build-libs.py \
            --backend "${{ matrix.backend }}" \
            --preset-name "${{ matrix.platform }}-${{ matrix.backend }}"

      - name: Package chirp-c
        shell: bash
        run: |
          uv run python scripts/package-libs.py \
            --backend "${{ matrix.backend }}" \
            --platform "${{ matrix.platform }}" \
            --archive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-c-${{ matrix.platform }}-${{ matrix.backend }}
          path: dist/chirp-c-${{ matrix.platform }}-${{ matrix.backend }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/chirp-c-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chirp-c-${{ matrix.platform }}-${{ matrix.backend }}.${{ matrix.archive_ext }}
