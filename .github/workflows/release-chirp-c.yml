name: release chirp-c

on:
  workflow_dispatch:
  push:
    tags:
      - "chirp-c-v*"

jobs:
  build:
    name: chirp-c ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            archive_ext: tar.gz
          - os: macos-14
            platform: darwin-arm64
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build chirp-c
        shell: bash
        run: |
          uv run python scripts/build-libs.py \
            --backend cpu \
            --preset-name "${{ matrix.platform }}-cpu"

      - name: Package chirp-c
        shell: bash
        run: |
          uv run python scripts/package-libs.py \
            --backend cpu \
            --platform "${{ matrix.platform }}" \
            --archive

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chirp-c-${{ matrix.platform }}-cpu
          path: dist/chirp-c-${{ matrix.platform }}-cpu.${{ matrix.archive_ext }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/chirp-c-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chirp-c-${{ matrix.platform }}-cpu.${{ matrix.archive_ext }}
