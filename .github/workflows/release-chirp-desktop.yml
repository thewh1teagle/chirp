name: release chirp-desktop

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: ubuntu-24.04
            args: --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
          package_json_file: chirp-desktop/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: chirp-desktop/pnpm-lock.yaml

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: chirp-desktop/src-tauri

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: chirp-desktop

      - name: Download runner sidecar
        run: uv run scripts/pre_build.py --target ${{ matrix.target }}

      - name: Build unsigned Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: chirp-desktop-v__VERSION__
          releaseName: chirp desktop v__VERSION__
          releaseBody: "Chirp desktop build."
          prerelease: true
          projectPath: chirp-desktop
          tauriScript: pnpm exec tauri
          args: ${{ matrix.args }}
